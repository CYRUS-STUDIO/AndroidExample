<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>WebShell Demo</title>

    <style>

        body {
            padding: 24px;
            font-family: sans-serif;
            background: #f5f5f5;
        }

        h2 {
            margin-bottom: 24px;
        }

        .btn {
            width: 100%;
            height: 56px;

            margin-top: 16px;

            border: none;
            border-radius: 12px;

            font-size: 18px;

            background: #1976d2;
            color: white;
        }

        .btn:active {
            opacity: 0.8;
        }

        .title {
            margin-top: 32px;
            font-size: 20px;
            font-weight: bold;
        }

    </style>
</head>

<body>

<h2>WebShell Bridge Demo</h2>

<div class="title">android namespace</div>

<button
        class="btn"
        onclick="callPostMessage()">

    android.postMessage

</button>

<button
        class="btn"
        onclick="callOnEvent()">

    android.onEvent

</button>

<button
        class="btn"
        onclick="callBgBiEvent()">

    android.bgBiEvent

</button>

<button
        class="btn"
        onclick="callSendEventCustom()">

    android.sendEventCustom

</button>

<div class="title">jsBridge namespace</div>

<button
        class="btn"
        onclick="callJsBridgePostMessage()">

    jsBridge.postMessage

</button>

<button
        class="btn"
        onclick="callJsBridgeOnEvent()">

    jsBridge.onEvent

</button>

<button
        class="btn"
        onclick="callJsBridgeBgBiEvent()">

    jsBridge.bgBiEvent

</button>

<button
        class="btn"
        onclick="callJsBridgeSendEventCustom()">

    jsBridge.sendEventCustom

</button>

<script>

    /**
     * android namespace
     */

    function callPostMessage() {

        window.android.postMessage(
            "login",
            "hello"
        );
    }

    function callOnEvent() {

        window.android.onEvent(
            JSON.stringify({
                type: "open"
            })
        );
    }

    function callBgBiEvent() {

        window.android.bgBiEvent(
            "event",
            "123"
        );
    }

    function callSendEventCustom() {

        window.android.sendEventCustom(
            "custom",
            "456"
        );
    }

    /**
     * jsBridge namespace
     */

    function callJsBridgePostMessage() {

        if (!window.jsBridge) {
            alert("jsBridge not ready");
            return;
        }

        window.jsBridge.postMessage(
            "login",
            "hello from jsBridge"
        );
    }

    function callJsBridgeOnEvent() {

        if (!window.jsBridge) {
            alert("jsBridge not ready");
            return;
        }

        window.jsBridge.onEvent(
            JSON.stringify({
                type: "open_jsBridge"
            })
        );
    }

    function callJsBridgeBgBiEvent() {

        if (!window.jsBridge) {
            alert("jsBridge not ready");
            return;
        }

        window.jsBridge.bgBiEvent(
            "event_jsBridge",
            "123456"
        );
    }

    function callJsBridgeSendEventCustom() {

        if (!window.jsBridge) {
            alert("jsBridge not ready");
            return;
        }

        window.jsBridge.sendEventCustom(
            "custom_jsBridge",
            "654321"
        );
    }

</script>

</body>
</html>
